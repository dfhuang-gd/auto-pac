name: Auto Sync Upstream + Replace Proxy

on:
  schedule:
    - cron: '0 0 * * *'      # 每天北京时间早上 8:00 左右自动运行
  workflow_dispatch:         # 支持手动点击运行测试

permissions:
  contents: write

jobs:
  sync-and-replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (master branch)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/zhiyi7/gfw-pac.git || true

      - name: Fetch latest upstream changes
        run: git fetch upstream

      - name: Merge upstream master
        run: |
          git checkout master
          git merge upstream/master --no-ff -m "Auto merge upstream changes" || echo "Merge completed (possibly no new changes)"

      - name: Replace proxy address to 192.168.0.254:10808
        run: |
          # 精确替换 proxy 这一行（兼容常见格式）
          sed -i 's|var proxy = "PROXY [^";]*|var proxy = "PROXY 192.168.0.254:10808|' gfw.pac
          echo "✅ Proxy replaced to 192.168.0.254:10808"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet gfw.pac; then
            echo "No changes detected after proxy replacement."
          else
            git add gfw.pac
            git commit -m "Auto update: merge upstream + replace proxy to 192.168.0.254:10808"
            git push origin master
            echo "✅ Successfully pushed updated gfw.pac"
          fi
